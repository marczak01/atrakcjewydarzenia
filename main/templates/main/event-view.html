{% extends "base.html" %}

{% block title %}{{ event.title }}{% endblock title %}

{% block content %}
    <h2>event info</h2>
    <p> {{ event.name }} </p>
    <p><img src='{{ event.event_photo.url }}' /> </p>
    {% for category in categories %}<span>{{category}}</span>{% endfor %}
    <p> {{ event.description }} </p>
{% endblock content %}
